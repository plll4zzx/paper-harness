name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Test
        run: python -m pytest

      - name: CLI help
        run: paperharness --help

      - name: Build example kit
        run: |
          paperharness build \
            --paper examples/minimal_pytorch/paper.txt \
            --repo examples/minimal_pytorch/repo \
            --out /tmp/paperharness-output \
            --force

      - name: Validate example kit
        run: paperharness validate /tmp/paperharness-output

      - name: Generated repro CLI
        working-directory: /tmp/paperharness-output/skill
        run: |
          python scripts/repro.py inspect
          python scripts/repro.py list
          python scripts/repro.py validate
          python scripts/repro.py report
